name: Sürüm oluştur

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: ummf-surum
  cancel-in-progress: true

jobs:
  derle-test-et-yayinla:
    name: Windows EXE, plugin ve kurulum akışını doğrula
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Depoyu al
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: .NET ortamını kur
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Sürümü oku
        id: surum
        shell: pwsh
        run: |
          $surum = (Get-Content VERSION -Raw).Trim()
          if ($surum -notmatch '^\d+\.\d+\.\d+([.-][0-9A-Za-z.-]+)?$') {
            throw "Geçersiz VERSION değeri: $surum"
          }
          "deger=$surum" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "etiket=v$surum" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Mevcut sürümü denetle
        id: mevcut
        env:
          GH_TOKEN: ${{ github.token }}
          ETIKET: ${{ steps.surum.outputs.etiket }}
          DEPO: ${{ github.repository }}
        shell: pwsh
        run: |
          $adres = "https://api.github.com/repos/$env:DEPO/releases/tags/$env:ETIKET"
          $basliklar = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $yanit = Invoke-WebRequest -Uri $adres -Headers $basliklar -SkipHttpErrorCheck
          if ($yanit.StatusCode -eq 200) {
            "var=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }
          elseif ($yanit.StatusCode -eq 404) {
            "var=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }
          else {
            throw "GitHub Release denetimi başarısız oldu. HTTP durumu: $($yanit.StatusCode)"
          }

      - name: Bağımlılıkları geri yükle
        run: dotnet restore UMMF.sln

      - name: Çözümü ve iki plugin hedefini derle
        shell: pwsh
        run: |
          dotnet build UMMF.sln --configuration Release --no-restore 2>&1 | Tee-Object -FilePath derleme.log
          if ($LASTEXITCODE -ne 0) {
            throw "Çözüm derlenemedi."
          }

          $net35 = "src/UMMF.BepInEx5.Mono/bin/Release/net35/UMMF.BepInEx5.Mono.dll"
          $netstandard = "src/UMMF.BepInEx5.Mono/bin/Release/netstandard2.0/UMMF.BepInEx5.Mono.dll"
          if (-not (Test-Path $net35)) {
            throw "net35 BepInEx 5 plugin çıktısı bulunamadı."
          }
          if (-not (Test-Path $netstandard)) {
            throw "netstandard2.0 BepInEx 5 plugin çıktısı bulunamadı."
          }

      - name: Birim testlerini çalıştır
        shell: pwsh
        run: |
          dotnet test UMMF.sln --configuration Release --no-build
          if ($LASTEXITCODE -ne 0) {
            throw "Testler başarısız oldu."
          }

      - name: Tek dosyalı Windows EXE üret
        shell: pwsh
        env:
          SURUM: ${{ steps.surum.outputs.deger }}
        run: |
          New-Item -ItemType Directory -Path artifacts/paket -Force | Out-Null
          dotnet publish src/UMMF.KomutSatiri/UMMF.KomutSatiri.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --no-restore `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:PublishTrimmed=false `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            --output artifacts/paket
          if ($LASTEXITCODE -ne 0) {
            throw "Windows EXE üretilemedi."
          }

          $kaynak = "artifacts/paket/ummf.exe"
          if (-not (Test-Path $kaynak)) {
            throw "Yayın çıktısında ummf.exe bulunamadı."
          }

          $hedef = "artifacts/UMMF-v$env:SURUM-windows-x64.exe"
          Copy-Item $kaynak $hedef -Force

          $digerDosyalar = @(Get-ChildItem artifacts/paket -File | Where-Object { $_.Name -ne 'ummf.exe' })
          if ($digerDosyalar.Count -gt 0) {
            $adlar = ($digerDosyalar.Name -join ', ')
            throw "Çıktı tek dosyalı değil. Ek dosyalar: $adlar"
          }

      - name: EXE açılış testini çalıştır
        shell: pwsh
        env:
          SURUM: ${{ steps.surum.outputs.deger }}
        run: |
          $exe = Resolve-Path "artifacts/UMMF-v$env:SURUM-windows-x64.exe"
          $cikti = & $exe bilgi 2>&1
          $cikisKodu = $LASTEXITCODE
          $cikti | Tee-Object -FilePath artifacts/CALISTIRMA-TESTI.txt

          if ($cikisKodu -ne 0) {
            throw "EXE açılış testi $cikisKodu çıkış koduyla başarısız oldu."
          }

          $metin = $cikti -join "`n"
          if ($metin -notmatch [regex]::Escape($env:SURUM)) {
            throw "EXE doğru sürüm bilgisini üretmedi."
          }

      - name: Gömülü net35 ve netstandard plugin kurulumlarını test et
        shell: pwsh
        env:
          SURUM: ${{ steps.surum.outputs.deger }}
        run: |
          $ErrorActionPreference = 'Stop'
          $exe = Resolve-Path "artifacts/UMMF-v$env:SURUM-windows-x64.exe"
          $bepinexDll = Get-ChildItem "$env:USERPROFILE/.nuget/packages/bepinex.core" -Recurse -Filter BepInEx.dll |
            Where-Object { $_.FullName -match 'net35' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if ($null -eq $bepinexDll) {
            throw "NuGet önbelleğinde BepInEx 5 net35 BepInEx.dll bulunamadı."
          }

          function Yeni-SahteOyun([string]$ad, [bool]$netstandard) {
            $kok = Join-Path $env:RUNNER_TEMP $ad
            $managed = Join-Path $kok "OrnekOyun_Data/Managed"
            $core = Join-Path $kok "BepInEx/core"
            New-Item -ItemType Directory -Path $managed -Force | Out-Null
            New-Item -ItemType Directory -Path $core -Force | Out-Null
            Set-Content (Join-Path $managed "Assembly-CSharp.dll") -Value "UMMF test düzeneği" -Encoding utf8
            Set-Content (Join-Path $kok "OrnekOyun_Data/globalgamemanagers") -Value "2019.4.40f1" -Encoding ascii
            Copy-Item $bepinexDll.FullName (Join-Path $core "BepInEx.dll") -Force
            if ($netstandard) {
              Set-Content (Join-Path $managed "netstandard.dll") -Value "UMMF test düzeneği" -Encoding utf8
            }
            return $kok
          }

          function Kurulumu-Dogrula([string]$oyun, [string]$beklenenCerceve, [string]$beklenenDll) {
            $kurCiktisi = & $exe kur $oyun 2>&1
            $kurCiktisi | Add-Content artifacts/KURULUM-TESTI.txt
            if ($LASTEXITCODE -ne 0) {
              throw "Kurulum komutu başarısız oldu: $oyun"
            }
            if (($kurCiktisi -join "`n") -notmatch [regex]::Escape($beklenenCerceve)) {
              throw "Beklenen hedef çerçeve seçilmedi: $beklenenCerceve"
            }

            $kuruluDll = Join-Path $oyun "BepInEx/plugins/UMMF/UMMF.BepInEx5.Mono.dll"
            if (-not (Test-Path $kuruluDll)) {
              throw "Plugin DLL'si kurulmadı: $kuruluDll"
            }
            if ((Get-FileHash $kuruluDll -Algorithm SHA256).Hash -ne (Get-FileHash $beklenenDll -Algorithm SHA256).Hash) {
              throw "EXE içinden çıkarılan plugin beklenen derleme ile aynı değil."
            }

            & $exe durum $oyun 2>&1 | Add-Content artifacts/KURULUM-TESTI.txt
            if ($LASTEXITCODE -ne 0) {
              throw "Durum komutu başarısız oldu."
            }
            & $exe rapor $oyun 2>&1 | Add-Content artifacts/KURULUM-TESTI.txt
            if ($LASTEXITCODE -ne 0) {
              throw "Rapor komutu başarısız oldu."
            }
            if (-not (Test-Path (Join-Path $oyun "BepInEx/UMMF/raporlar/kurulum-teshis-raporu.json"))) {
              throw "Kurulum teşhis raporu üretilmedi."
            }

            & $exe kaldir $oyun 2>&1 | Add-Content artifacts/KURULUM-TESTI.txt
            if ($LASTEXITCODE -ne 0) {
              throw "Kaldırma komutu başarısız oldu."
            }
            if (Test-Path $kuruluDll) {
              throw "Plugin DLL'si kaldırılamadı."
            }
            if (-not (Test-Path (Join-Path $oyun "BepInEx/UMMF/modlar"))) {
              throw "Kaldırma kullanıcı mod klasörünü silmemeliydi."
            }
          }

          $eskiOyun = Yeni-SahteOyun "UMMF-Eski-Mono" $false
          $modernOyun = Yeni-SahteOyun "UMMF-Modern-Mono" $true
          Kurulumu-Dogrula $eskiOyun "net35" "src/UMMF.BepInEx5.Mono/bin/Release/net35/UMMF.BepInEx5.Mono.dll"
          Kurulumu-Dogrula $modernOyun "netstandard2.0" "src/UMMF.BepInEx5.Mono/bin/Release/netstandard2.0/UMMF.BepInEx5.Mono.dll"

      - name: SHA-256 özeti oluştur
        shell: pwsh
        env:
          SURUM: ${{ steps.surum.outputs.deger }}
        run: |
          $exe = "artifacts/UMMF-v$env:SURUM-windows-x64.exe"
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash *$(Split-Path $exe -Leaf)" | Set-Content artifacts/SHA256-OZETLERI.txt -Encoding utf8

      - name: Yeni tam GitHub Release oluştur
        if: steps.mevcut.outputs.var != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SURUM: ${{ steps.surum.outputs.deger }}
          ETIKET: ${{ steps.surum.outputs.etiket }}
        shell: pwsh
        run: |
          $notDosyasi = "belgeler/surum-notlari/$env:SURUM.md"
          if (-not (Test-Path $notDosyasi)) {
            $notDosyasi = "$env:RUNNER_TEMP/surum-notlari.md"
            "# UMMF $env:SURUM`n`nOtomatik oluşturulan sürüm." | Set-Content $notDosyasi -Encoding utf8
          }

          $exe = "artifacts/UMMF-v$env:SURUM-windows-x64.exe"
          $ozet = "artifacts/SHA256-OZETLERI.txt"
          & gh release create $env:ETIKET `
            $exe $ozet `
            --target $env:GITHUB_SHA `
            --title "UMMF $env:SURUM" `
            --notes-file $notDosyasi `
            --latest 2>&1 | Tee-Object -FilePath surum.log
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release oluşturulamadı."
          }

      - name: Mevcut sürümü Latest Release olarak işaretle
        if: steps.mevcut.outputs.var == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ETIKET: ${{ steps.surum.outputs.etiket }}
        shell: pwsh
        run: |
          gh release edit $env:ETIKET --prerelease=false --latest
          if ($LASTEXITCODE -ne 0) {
            throw "Mevcut GitHub Release, Latest olarak işaretlenemedi."
          }

      - name: Release ve doğrudan EXE varlığını doğrula
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          ETIKET: ${{ steps.surum.outputs.etiket }}
          SURUM: ${{ steps.surum.outputs.deger }}
        shell: pwsh
        run: |
          $surumBilgisi = gh release view $env:ETIKET --json assets,isLatest,isPrerelease | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release doğrulanamadı."
          }

          $beklenenExe = "UMMF-v$env:SURUM-windows-x64.exe"
          $varlikAdlari = @($surumBilgisi.assets | ForEach-Object { $_.name })
          if ($varlikAdlari -notcontains $beklenenExe) {
            throw "Release içinde doğrudan EXE bulunamadı: $beklenenExe"
          }
          if ($surumBilgisi.isPrerelease) {
            throw "Release yanlışlıkla ön sürüm olarak işaretlenmiş."
          }
          if (-not $surumBilgisi.isLatest) {
            throw "Release, Latest olarak işaretlenmemiş."
          }

          gh issue comment 14 --body "$env:ETIKET; Windows EXE açılış testi, net35/netstandard2.0 gömülü plugin kurulumu, durum, rapor ve kaldırma testlerinden geçti. Normal Latest Release olarak doğrulandı."

          gh issue list `
            --state open `
            --search "Sürüm $env:SURUM oluşturulamadı in:title" `
            --json number `
            --jq '.[].number' | ForEach-Object {
              if (-not [string]::IsNullOrWhiteSpace($_)) {
                gh issue close $_ `
                  --reason completed `
                  --comment "$env:ETIKET tam GitHub Release, Latest ve doğrulanmış EXE ile başarıyla yayımlandı." *> $null
              }
            }

      - name: Sürüm hatasını bildir
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          SURUM: ${{ steps.surum.outputs.deger }}
          CALISMA_ADRESI: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: pwsh
        run: |
          $surumAdi = if ([string]::IsNullOrWhiteSpace($env:SURUM)) { 'bilinmiyor' } else { $env:SURUM }
          $baslik = "Sürüm $surumAdi oluşturulamadı (çalışma ${{ github.run_id }})"
          $geciciDosya = "$env:RUNNER_TEMP/sorun.md"
          $satirlar = @(
            'Otomatik Windows EXE ve BepInEx plugin iş akışı başarısız oldu.',
            '',
            "Çalışma: $env:CALISMA_ADRESI"
          )

          foreach ($dosya in @('derleme.log', 'surum.log', 'artifacts/CALISTIRMA-TESTI.txt', 'artifacts/KURULUM-TESTI.txt')) {
            if (Test-Path $dosya) {
              $satirlar += ''
              $satirlar += '```text'
              $satirlar += Get-Content $dosya | Select-Object -Last 100
              $satirlar += '```'
            }
          }

          $satirlar | Set-Content $geciciDosya -Encoding utf8
          gh issue create --title $baslik --body-file $geciciDosya
