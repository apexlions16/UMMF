name: Sürüm oluştur

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: ummf-surum
  cancel-in-progress: true

jobs:
  derle-test-et-yayinla:
    name: Windows arayüzünü, pluginleri ve kurulum akışını doğrula
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - name: Depoyu al
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: .NET ortamını kur
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Sürümü oku
        id: surum
        shell: pwsh
        run: |
          $surum = (Get-Content VERSION -Raw).Trim()
          if ($surum -notmatch '^\d+\.\d+\.\d+([.-][0-9A-Za-z.-]+)?$') {
            throw "Geçersiz VERSION değeri: $surum"
          }
          "deger=$surum" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "etiket=v$surum" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Mevcut sürümü denetle
        id: mevcut
        env:
          GH_TOKEN: ${{ github.token }}
          ETIKET: ${{ steps.surum.outputs.etiket }}
          DEPO: ${{ github.repository }}
        shell: pwsh
        run: |
          $adres = "https://api.github.com/repos/$env:DEPO/releases/tags/$env:ETIKET"
          $basliklar = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $yanit = Invoke-WebRequest -Uri $adres -Headers $basliklar -SkipHttpErrorCheck
          if ($yanit.StatusCode -eq 200) {
            "var=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }
          elseif ($yanit.StatusCode -eq 404) {
            "var=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }
          else {
            throw "GitHub Release denetimi başarısız oldu. HTTP durumu: $($yanit.StatusCode)"
          }

      - name: Bağımlılıkları geri yükle
        run: dotnet restore UMMF.sln

      - name: Çözümü, masaüstü arayüzünü ve plugin hedeflerini derle
        shell: pwsh
        run: |
          dotnet build UMMF.sln --configuration Release --no-restore 2>&1 | Tee-Object -FilePath derleme.log
          if ($LASTEXITCODE -ne 0) {
            throw "Çözüm derlenemedi."
          }

          $net35 = "src/UMMF.BepInEx5.Mono/bin/Release/net35/UMMF.BepInEx5.Mono.dll"
          $netstandard = "src/UMMF.BepInEx5.Mono/bin/Release/netstandard2.0/UMMF.BepInEx5.Mono.dll"
          $cli = "src/UMMF.KomutSatiri/bin/Release/net8.0/ummf.exe"
          $gui = "src/UMMF.Masaustu/bin/Release/net8.0-windows/UMMF.dll"
          foreach ($dosya in @($net35, $netstandard, $cli, $gui)) {
            if (-not (Test-Path $dosya)) {
              throw "Beklenen derleme çıktısı bulunamadı: $dosya"
            }
          }

      - name: Birim testlerini çalıştır
        shell: pwsh
        run: |
          dotnet test UMMF.sln --configuration Release --no-build
          if ($LASTEXITCODE -ne 0) {
            throw "Testler başarısız oldu."
          }

      - name: Tek dosyalı Windows masaüstü EXE üret
        shell: pwsh
        env:
          SURUM: ${{ steps.surum.outputs.deger }}
        run: |
          New-Item -ItemType Directory -Path artifacts/paket -Force | Out-Null
          dotnet publish src/UMMF.Masaustu/UMMF.Masaustu.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:BuildProjectReferences=false `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:PublishTrimmed=false `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            --output artifacts/paket 2>&1 | Tee-Object -FilePath yayin.log
          if ($LASTEXITCODE -ne 0) {
            throw "Windows masaüstü EXE üretilemedi."
          }

          $kaynak = "artifacts/paket/UMMF.exe"
          if (-not (Test-Path $kaynak)) {
            throw "Yayın çıktısında UMMF.exe bulunamadı."
          }

          $hedef = "artifacts/UMMF-v$env:SURUM-windows-x64.exe"
          Copy-Item $kaynak $hedef -Force
          Get-ChildItem artifacts/paket -File |
            Select-Object Name, Length |
            Format-Table -AutoSize |
            Out-String |
            Set-Content artifacts/YAYIN-DOSYALARI.txt -Encoding utf8

      - name: Masaüstü arayüz duman testini çalıştır
        shell: pwsh
        env:
          SURUM: ${{ steps.surum.outputs.deger }}
        run: |
          $exe = Resolve-Path "artifacts/UMMF-v$env:SURUM-windows-x64.exe"
          $sonuc = Resolve-Path artifacts
          $rapor = Join-Path $sonuc "ARAYUZ-TESTI.txt"
          & $exe --arayuz-testi $rapor
          if ($LASTEXITCODE -ne 0) {
            throw "Masaüstü arayüz duman testi başarısız oldu."
          }
          if (-not (Test-Path $rapor)) {
            throw "Arayüz test raporu oluşturulmadı."
          }
          $metin = Get-Content $rapor -Raw
          foreach ($beklenen in @($env:SURUM, 'BAŞARILI', 'Ana Sayfa', 'Oyun ve Kurulum', 'Uyumluluk', 'Topluluk Katkısı', 'Günlük')) {
            if ($metin -notmatch [regex]::Escape($beklenen)) {
              throw "Arayüz testinde beklenen metin bulunamadı: $beklenen"
            }
          }
          Get-Content $rapor

      - name: Gömülü net35 ve netstandard plugin kurulumlarını test et
        shell: pwsh
        env:
          SURUM: ${{ steps.surum.outputs.deger }}
        run: |
          $cli = Resolve-Path "src/UMMF.KomutSatiri/bin/Release/net8.0/ummf.exe"
          & ./.github/scripts/bepinex5-kurulum-testi.ps1 `
            -ExeYolu $cli `
            -Surum $env:SURUM
          if ($LASTEXITCODE -ne 0) {
            throw "BepInEx 5 kurulum testi başarısız oldu."
          }

      - name: SHA-256 özeti oluştur
        shell: pwsh
        env:
          SURUM: ${{ steps.surum.outputs.deger }}
        run: |
          $exe = "artifacts/UMMF-v$env:SURUM-windows-x64.exe"
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash *$(Split-Path $exe -Leaf)" | Set-Content artifacts/SHA256-OZETLERI.txt -Encoding utf8

      - name: Yeni tam GitHub Release oluştur
        if: steps.mevcut.outputs.var != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SURUM: ${{ steps.surum.outputs.deger }}
          ETIKET: ${{ steps.surum.outputs.etiket }}
        shell: pwsh
        run: |
          $notDosyasi = "belgeler/surum-notlari/$env:SURUM.md"
          if (-not (Test-Path $notDosyasi)) {
            $notDosyasi = "$env:RUNNER_TEMP/surum-notlari.md"
            "# UMMF $env:SURUM`n`nOtomatik oluşturulan masaüstü arayüz sürümü." | Set-Content $notDosyasi -Encoding utf8
          }

          $exe = "artifacts/UMMF-v$env:SURUM-windows-x64.exe"
          $ozet = "artifacts/SHA256-OZETLERI.txt"
          & gh release create $env:ETIKET `
            $exe $ozet `
            --target $env:GITHUB_SHA `
            --title "UMMF $env:SURUM" `
            --notes-file $notDosyasi `
            --latest 2>&1 | Tee-Object -FilePath surum.log
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release oluşturulamadı."
          }

      - name: Mevcut sürümü Latest Release olarak işaretle
        if: steps.mevcut.outputs.var == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ETIKET: ${{ steps.surum.outputs.etiket }}
        shell: pwsh
        run: |
          gh release edit $env:ETIKET --prerelease=false --latest
          if ($LASTEXITCODE -ne 0) {
            throw "Mevcut GitHub Release, Latest olarak işaretlenemedi."
          }

      - name: Release ve doğrudan GUI EXE varlığını doğrula
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          ETIKET: ${{ steps.surum.outputs.etiket }}
          SURUM: ${{ steps.surum.outputs.deger }}
          DEPO: ${{ github.repository }}
        shell: pwsh
        run: |
          $surumBilgisi = gh release view $env:ETIKET --json assets,isPrerelease,tagName | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release doğrulanamadı."
          }

          $beklenenExe = "UMMF-v$env:SURUM-windows-x64.exe"
          $varlikAdlari = @($surumBilgisi.assets | ForEach-Object { $_.name })
          if ($varlikAdlari -notcontains $beklenenExe) {
            throw "Release içinde doğrudan GUI EXE bulunamadı: $beklenenExe"
          }
          if ($surumBilgisi.isPrerelease) {
            throw "Release yanlışlıkla ön sürüm olarak işaretlenmiş."
          }
          if ($surumBilgisi.tagName -ne $env:ETIKET) {
            throw "Release etiketi beklenen etiketle eşleşmiyor."
          }

          $latestEtiket = gh api "repos/$env:DEPO/releases/latest" --jq '.tag_name'
          if ($LASTEXITCODE -ne 0 -or $latestEtiket.Trim() -ne $env:ETIKET) {
            throw "Release, GitHub Latest kaydı olarak görünmüyor."
          }

          gh issue comment 26 --body "$env:ETIKET; Windows masaüstü arayüz duman testi, çözüm testleri ve BepInEx 5 kurulum testlerinden geçti. Doğrudan GUI EXE içeren normal Latest Release olarak doğrulandı."

          gh issue list `
            --state open `
            --search "Sürüm $env:SURUM oluşturulamadı in:title" `
            --json number `
            --jq '.[].number' | ForEach-Object {
              if (-not [string]::IsNullOrWhiteSpace($_)) {
                gh issue close $_ `
                  --reason completed `
                  --comment "$env:ETIKET GUI Release, Latest ve doğrulanmış EXE ile başarıyla yayımlandı." *> $null
              }
            }

      - name: Sürüm hatasını bildir
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          SURUM: ${{ steps.surum.outputs.deger }}
          CALISMA_ADRESI: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: pwsh
        run: |
          $surumAdi = if ([string]::IsNullOrWhiteSpace($env:SURUM)) { 'bilinmiyor' } else { $env:SURUM }
          $baslik = "Sürüm $surumAdi oluşturulamadı (çalışma ${{ github.run_id }})"
          $geciciDosya = "$env:RUNNER_TEMP/sorun.md"
          $satirlar = @(
            'Otomatik Windows masaüstü arayüz ve BepInEx plugin iş akışı başarısız oldu.',
            '',
            "Çalışma: $env:CALISMA_ADRESI"
          )

          foreach ($dosya in @('derleme.log', 'yayin.log', 'surum.log', 'artifacts/YAYIN-DOSYALARI.txt', 'artifacts/ARAYUZ-TESTI.txt', 'artifacts/KURULUM-TESTI.txt')) {
            if (Test-Path $dosya) {
              $satirlar += ''
              $satirlar += '```text'
              $satirlar += Get-Content $dosya | Select-Object -Last 120
              $satirlar += '```'
            }
          }

          $satirlar | Set-Content $geciciDosya -Encoding utf8
          gh issue create --title $baslik --body-file $geciciDosya
