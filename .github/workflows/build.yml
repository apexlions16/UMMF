name: build

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore UMMF.sln

      - name: Build
        run: dotnet build UMMF.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test UMMF.sln --configuration Release --no-build --collect:"XPlat Code Coverage"
