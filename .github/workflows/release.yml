name: Türkçeleştirme geçişini uygula

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  turkcelestirme-gecisi:
    name: Türkçe proje ağacını main dalına uygula
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Depoyu al
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Paketi birleştir ve doğrula
        shell: bash
        run: |
          set -euo pipefail
          PARCA_SAYISI="$(find araclar/turkcelestirme -name 'parca-*.txt' | wc -l)"
          test "$PARCA_SAYISI" -eq 6
          cat araclar/turkcelestirme/parca-*.txt | base64 --decode > "${RUNNER_TEMP}/ummf-turkce.tar.gz"
          tar -tzf "${RUNNER_TEMP}/ummf-turkce.tar.gz" > "${RUNNER_TEMP}/dosya-listesi.txt"
          grep -q './README.md' "${RUNNER_TEMP}/dosya-listesi.txt"
          grep -q './src/UMMF.KomutSatiri/Program.cs' "${RUNNER_TEMP}/dosya-listesi.txt"
          grep -q './.github/workflows/surum.yml' "${RUNNER_TEMP}/dosya-listesi.txt"

      - name: Eski ağacı kaldır ve Türkçe ağacı aç
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xzf "${RUNNER_TEMP}/ummf-turkce.tar.gz" -C .

      - name: Değişiklikleri gönder
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Projeyi baştan sona Türkçeleştir"
          git push origin main

      - name: Başarısız geçişi bildir
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          CALISMA_ADRESI: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          gh issue create \
            --title "Türkçeleştirme geçişi başarısız oldu (çalışma ${{ github.run_id }})" \
            --body "Türkçe proje ağacı uygulanamadı. Çalışma: $CALISMA_ADRESI"
